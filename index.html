<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factorial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card-factorial">

      <div class="card-header-custom text-center mb-4">
        <div class="icon-wrap mx-auto mb-3">
          <span>!</span>
        </div>
        <h1 class="card-title">Calculadora de Factorial</h1>
        <p class="card-subtitle">Lógica de Programación 3</p>
      </div>

      <div class="mb-3">
        <label for="entrada" class="form-label">Número entero</label>
        <input
          type="text"
          id="entrada"
          class="form-control input-custom"
          placeholder="Ej: 5"
          autocomplete="off"
        />
      </div>

      <button class="btn btn-calc w-100" onclick="calcularFactorial()">
        Calcular
      </button>

      <div id="resultado" class="resultado-box mt-4 d-none">
        <p id="pasos" class="pasos-text"></p>
        <p id="valor" class="valor-text"></p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
